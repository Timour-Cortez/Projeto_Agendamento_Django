{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir senha - Agenda Fácil</title>
    <link rel="stylesheet" href="{% static 'css/esqueci_senha.css' %}">
</head>

<body>
    <main class="container-login">
        <section class="caixa-login">
            <h1>Criar nova senha</h1>

            {% if validlink %}
                <p>Digite e confirme sua nova senha abaixo.</p>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="botao-enviar">Salvar nova senha</button>
                </form>
            {% else %}
                <p>Este link é inválido ou já foi utilizado.</p>
                <a href="/esqueci-senha/">Solicitar um novo link</a>
            {% endif %}

            <a class="voltar" href="/login/">Voltar para o login</a>
        </section>
    </main>
</body>
</html>
