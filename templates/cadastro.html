{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Agenda Fácil</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>

    <main class="container-login">
        <section class="caixa-login">
            <h1>Criar conta</h1>
            <p>Cadastre-se para agendar seus serviços.</p>

            <form method="POST">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit">Criar conta</button>
            </form>

            <p class="texto-cadastro">
                Já tem uma conta?
                <a href="/login/">Entrar</a>
            </p>

            <a class="voltar" href="/">Voltar para a página inicial</a>
        </section>
    </main>

</body>
</html>
