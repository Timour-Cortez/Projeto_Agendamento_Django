<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclamação recebida - Agenda Fácil</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .caixa {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .icone { font-size: 3rem; margin-bottom: 16px; }

        h1 {
            font-size: 1.5rem;
            color: #27ae60;
            margin-bottom: 12px;
        }

        p {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        a {
            display: inline-block;
            padding: 10px 28px;
            background: #c0392b;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        a:hover { background: #a93226; }
    </style>
</head>

<body>
    <div class="caixa">
        <div class="icone">✅</div>
        <h1>Reclamação recebida!</h1>
        <p>Obrigado pelo seu feedback. Recebemos sua reclamação e nossa equipe irá analisá-la em breve.</p>
        <a href="/">Voltar para a página inicial</a>
    </div>
</body>
</html>
