{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci minha senha - Agenda Fácil</title>
    <link rel="stylesheet" href="{% static 'css/esqueci_senha.css' %}">
</head>

<body>

    <main class="container-login">
        <section class="caixa-login">
            <h1>Esqueci minha senha</h1>
            <p>Digite seu e-mail para receber o link de recuperação.</p>

            <form method="POST">
                {% csrf_token %}

                <div class="grupo-input">
                    <input type="email" id="email" name="email" placeholder="Ex: seuemail@email.com" required>
                </div>

                <button type="submit">Enviar link</button>
            </form>

            <a class="voltar" href="/login/">Voltar para o login</a>
        </section>
    </main>

</body>
</html>
